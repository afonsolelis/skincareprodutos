<!DOCTYPE html>
<html lang="pt-br" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkinCareFriends | Pure Beauty</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta name="theme-color" content="#E2A9A1">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --perola: #FAFAFA;
            --rosegold: #E2A9A1;
            --apple-black: #1D1D1F;
            --apple-gray: #86868B;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--perola); color: var(--apple-black); }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }

        .search-container { position: relative; display: flex; items-center: center; }
        #search-input { width: 0; opacity: 0; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-bottom: 1px solid var(--rosegold); outline: none; background: transparent; padding: 0 4px; font-size: 0.875rem; color: var(--apple-black); }
        #search-input.active { width: 180px; opacity: 1; margin-right: 12px; }
        .search-trigger { cursor: pointer; color: var(--apple-black); transition: color 0.3s ease; }
        .search-trigger:hover { color: var(--rosegold); }

        .product-card { cursor: pointer; transition: opacity 0.4s ease, transform 0.4s ease; border-radius: 0; }
        .product-card:hover { opacity: 0.85; transform: translateY(-2px); }
        .product-image { width: 100%; height: auto; display: block; object-fit: contain; aspect-ratio: 1/1; }

        #modal-overlay { transition: opacity 0.4s ease; }
        #modal-content { transition: transform 0.4s cubic-bezier(0.2, 1, 0.3, 1); }
        .modal-glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); }
        .btn-action { background-color: var(--rosegold); color: white; transition: opacity 0.3s; }
        .btn-action:hover { opacity: 0.9; }
        .btn-whatsapp { background-color: var(--rosegold); color: white; transition: opacity 0.3s; display: inline-flex; align-items: center; gap: 10px; }
        .btn-whatsapp:hover { opacity: 0.9; }
        .btn-whatsapp svg { width: 18px; height: 18px; }
        .modal-product-image { width: 100%; height: 100%; object-fit: contain; background: #fff; }
        .modal-desc-scroll { scrollbar-width: thin; scrollbar-color: var(--rosegold) transparent; }
        .modal-desc-scroll::-webkit-scrollbar { width: 6px; }
        .modal-desc-scroll::-webkit-scrollbar-track { background: transparent; }
        .modal-desc-scroll::-webkit-scrollbar-thumb { background: var(--rosegold); border-radius: 999px; opacity: 0.6; }
        .modal-desc-scroll::-webkit-scrollbar-thumb:hover { background: #c98a82; }

        .text-rosegold { color: var(--rosegold); }
        .hidden-card { display: none; }

        .skeleton { background: linear-gradient(90deg, #f3f3f3 25%, #ececec 37%, #f3f3f3 63%); background-size: 400% 100%; animation: shimmer 1.4s ease infinite; aspect-ratio: 1/1; }
        @keyframes shimmer { 0% { background-position: 100% 50%; } 100% { background-position: 0 50%; } }
    </style>
</head>
<body class="antialiased select-none">

    <nav class="p-8 md:p-12 flex justify-between items-center bg-transparent max-w-7xl mx-auto">
        <h1 class="text-2xl md:text-3xl font-bold tracking-tighter text-rosegold">SkinCareFriends</h1>
        <div class="flex items-center gap-6">
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Pesquisar produto..." oninput="filterProducts()">
                <div class="search-trigger" onclick="toggleSearch()">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
            </div>
            <a href="/admin" class="text-[10px] font-bold text-gray-300 hover:text-rosegold tracking-[0.2em] uppercase">Admin</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 pb-32">
        <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12 md:gap-16 lg:gap-20">
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
        </div>

        <div id="no-results" class="hidden text-center py-20">
            <p class="text-apple-gray font-light">Nenhum produto encontrado para sua busca.</p>
        </div>

        <div id="empty-state" class="hidden text-center py-32">
            <p class="text-apple-gray font-light">Nenhum produto cadastrado ainda.</p>
            <a href="/admin" class="inline-block mt-6 text-[10px] font-bold text-rosegold tracking-[0.3em] uppercase">Ir para o painel</a>
        </div>
    </main>

    <div id="modal-overlay" class="fixed inset-0 z-50 flex items-center justify-center p-4 md:p-8 bg-black/5 opacity-0 pointer-events-none" onclick="closeModal()">
        <div id="modal-content" class="modal-glass max-w-4xl w-full h-[90vh] md:h-auto md:max-h-[85vh] overflow-y-auto md:overflow-hidden shadow-sm scale-95 flex flex-col md:flex-row" onclick="event.stopPropagation()">
            <div class="w-full md:w-1/2 aspect-square md:aspect-auto bg-white flex-shrink-0">
                <img id="modal-img" src="" class="modal-product-image">
            </div>
            <div class="w-full md:w-1/2 p-10 md:p-16 flex flex-col relative bg-white md:bg-transparent md:max-h-[85vh] md:overflow-hidden">
                <button onclick="closeModal()" class="absolute top-8 right-8 text-gray-400 hover:text-rosegold transition z-10">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
                <h2 id="modal-title" class="text-4xl md:text-5xl mb-8 tracking-tighter text-rosegold font-bold pr-10"></h2>
                <div class="md:flex-1 md:min-h-0 md:overflow-y-auto md:pr-3 mb-12 modal-desc-scroll">
                    <p id="modal-description" class="text-apple-gray text-lg font-light leading-relaxed whitespace-pre-line"></p>
                </div>
                <div class="flex items-center justify-between gap-4 flex-wrap mt-auto md:mt-0">
                    <span id="modal-price" class="text-3xl font-medium text-apple-black tracking-tight"></span>
                    <a id="wa-link" href="https://wa.me/5511978101179" target="_blank" rel="noopener" class="btn-whatsapp px-10 py-4 rounded-full text-xs font-bold tracking-[0.2em] uppercase">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                            <path d="M17.47 14.38c-.3-.15-1.76-.87-2.03-.97-.27-.1-.47-.15-.67.15-.2.3-.77.97-.94 1.17-.17.2-.35.22-.65.07-.3-.15-1.26-.46-2.4-1.48-.89-.79-1.49-1.77-1.66-2.07-.17-.3-.02-.46.13-.61.13-.13.3-.35.45-.52.15-.17.2-.3.3-.5.1-.2.05-.37-.02-.52-.07-.15-.67-1.62-.92-2.22-.24-.58-.49-.5-.67-.51l-.57-.01c-.2 0-.52.07-.79.37-.27.3-1.04 1.02-1.04 2.48 0 1.46 1.06 2.87 1.21 3.07.15.2 2.09 3.19 5.06 4.47.71.31 1.26.5 1.69.64.71.23 1.35.2 1.86.12.57-.08 1.76-.72 2.01-1.41.25-.7.25-1.29.17-1.41-.07-.12-.27-.2-.57-.35Zm-5.44 7.4h-.01a9.87 9.87 0 0 1-5.03-1.38l-.36-.21-3.74.98 1-3.64-.23-.37A9.86 9.86 0 1 1 12.03 21.78Zm8.4-18.27A11.82 11.82 0 0 0 12.02 0C5.5 0 .2 5.3.2 11.82c0 2.08.54 4.11 1.58 5.9L.1 24l6.43-1.69a11.8 11.8 0 0 0 5.5 1.4h.01c6.52 0 11.82-5.3 11.82-11.82 0-3.16-1.23-6.13-3.46-8.37Z"/>
                        </svg>
                        WhatsApp
                    </a>
                </div>
            </div>
        </div>
    </div>

    <footer class="p-12 text-center border-t border-gray-50">
        <p class="text-[10px] font-bold text-gray-300 tracking-[0.3em] uppercase">&copy; 2026 SkinCareFriends</p>
    </footer>

    <script>
        let products = [];

        async function loadProducts() {
            try {
                const res = await fetch('/api/products');
                products = await res.json();
                renderProducts();
            } catch (err) {
                console.error(err);
                document.getElementById('product-grid').innerHTML = '<p class="text-apple-gray text-center col-span-full">Erro ao carregar produtos.</p>';
            }
        }

        function renderProducts() {
            const grid = document.getElementById('product-grid');
            const empty = document.getElementById('empty-state');
            if (!products.length) {
                grid.innerHTML = '';
                grid.classList.add('hidden');
                empty.classList.remove('hidden');
                return;
            }
            grid.classList.remove('hidden');
            empty.classList.add('hidden');
            grid.innerHTML = products.map(p => `
                <div class="product-card" data-search="${escapeAttr(normalize((p.name || '') + ' ' + (p.description || '')))}" onclick='openModal(${JSON.stringify(p).replace(/'/g, "&apos;")})'>
                    <div class="bg-white">
                        <img src="${p.imageUrl}" alt="${escapeAttr(p.name)}" class="product-image" loading="lazy">
                    </div>
                    <div class="mt-4 flex justify-between items-baseline">
                        <h3 class="text-lg md:text-xl font-bold tracking-tighter text-rosegold">${escapeHtml(p.name)}</h3>
                        <span class="text-[10px] text-rosegold font-bold uppercase tracking-widest">Discover</span>
                    </div>
                    <p class="mt-1 text-[10px] font-bold uppercase tracking-[0.2em]" style="color:${(p.stock || 0) > 0 ? 'var(--apple-gray)' : '#e53e3e'}">
                        ${(p.stock || 0) > 0 ? `Em estoque: ${p.stock}` : 'Esgotado'}
                    </p>
                </div>
            `).join('');
            filterProducts();
        }

        function escapeHtml(s) {
            return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        }
        function escapeAttr(s) { return escapeHtml(s); }
        function normalize(s) {
            return String(s || '').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
        }

        function toggleSearch() {
            const input = document.getElementById('search-input');
            input.classList.toggle('active');
            if (input.classList.contains('active')) input.focus();
            else { input.value = ''; filterProducts(); }
        }

        function filterProducts() {
            const query = normalize(document.getElementById('search-input').value);
            const cards = document.querySelectorAll('.product-card');
            const noResults = document.getElementById('no-results');
            let hasResults = false;
            cards.forEach(card => {
                const haystack = card.getAttribute('data-search') || '';
                if (!query || haystack.includes(query)) { card.classList.remove('hidden-card'); hasResults = true; }
                else { card.classList.add('hidden-card'); }
            });
            noResults.classList.toggle('hidden', hasResults || !cards.length || !query);
        }

        function openModal(p) {
            document.getElementById('modal-title').innerText = p.name || '';
            document.getElementById('modal-img').src = p.imageUrl || '';
            document.getElementById('modal-description').innerText = p.description || '';
            document.getElementById('modal-price').innerText = p.price || '';
            const waMsg = `Olá! Tenho interesse no produto ${p.name || ''}.`;
            document.getElementById('wa-link').href = `https://wa.me/5511978101179?text=${encodeURIComponent(waMsg)}`;
            const overlay = document.getElementById('modal-overlay');
            const content = document.getElementById('modal-content');
            overlay.classList.remove('opacity-0', 'pointer-events-none');
            overlay.classList.add('opacity-100');
            content.classList.remove('scale-95');
            content.classList.add('scale-100');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const overlay = document.getElementById('modal-overlay');
            const content = document.getElementById('modal-content');
            overlay.classList.remove('opacity-100');
            overlay.classList.add('opacity-0', 'pointer-events-none');
            content.classList.remove('scale-100');
            content.classList.add('scale-95');
            document.body.style.overflow = 'auto';
        }

        loadProducts();
    </script>
</body>
</html>
